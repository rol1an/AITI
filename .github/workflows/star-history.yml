name: Update Star History Chart

on:
  schedule:
    # UTC 2:00 / 14:00 每天 (北京 10:00 / 22:00)
    - cron: '0 2 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Star History SVG
        run: |
          curl -fsSL \
            "https://api.star-history.com/svg?repos=tianxingleo/ACGTI&type=Date" \
            -o assets/star-history.svg

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet assets/star-history.svg && echo "No changes" && exit 0
          git add assets/star-history.svg
          git commit -m "chore: update star-history chart"
          git push
